name: reelio
description: "Reelio — A short-form video app inspired by Instagram Reels."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  bloc: ^9.0.0
  cached_video_player_plus: ^4.1.0
  chewie: ^1.13.0
  cloud_firestore: ^5.6.3
  equatable: ^2.0.7
  firebase_auth: ^5.5.0
  firebase_core: ^3.11.0
  firebase_storage: ^12.4.3
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_svg: ^2.2.4
  fpdart: ^1.1.1
  get_it: ^8.0.3
  go_router: ^15.1.2
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.2
  injectable: ^2.5.0
  logger: ^2.5.0
  video_player: ^2.11.1
  visibility_detector: ^0.4.0+2

dev_dependencies:
  build_runner: ^2.4.14
  flutter_test:
    sdk: flutter
  injectable_generator: ^2.7.0
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
