name: reelio
description: "Reelio — A short-form video app inspired by Instagram Reels."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  bloc: ^9.0.0
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  fpdart: ^1.1.1
  get_it: ^8.0.3
  go_router: ^15.1.2
  google_fonts: ^6.2.1
  injectable: ^2.5.0
  logger: ^2.5.0

dev_dependencies:
  build_runner: ^2.4.14
  flutter_test:
    sdk: flutter
  injectable_generator: ^2.7.0
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true
